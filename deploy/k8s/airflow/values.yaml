# Helm values for `apache-airflow/airflow` chart (≥1.15).
# Install with:
#   helm repo add apache-airflow https://airflow.apache.org
#   helm upgrade --install airflow apache-airflow/airflow \
#     -n airflow --create-namespace \
#     -f deploy/k8s/airflow/values.yaml

executor: KubernetesExecutor

# DAGs are mounted from an externally-populated PVC (official Airflow pattern).
# The upload API writes to the PVC; scheduler and executor pods read from it.
dags:
  persistence:
    enabled: true
    existingClaim: airflow-dags
  gitSync:
    enabled: false

config:
  core:
    dag_dir_list_interval: "30"
    load_examples: "False"
  scheduler:
    min_file_process_interval: "30"
  kubernetes:
    pod_template_file: /opt/airflow/pod_templates/pod_template_file.yaml

serviceAccount:
  create: true
  name: airflow

webserver:
  service:
    type: ClusterIP
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: daniel@straloo.com.br
    firstName: Daniel
    lastName: Admin
    password: admin

postgresql:
  enabled: true

redis:
  enabled: false
