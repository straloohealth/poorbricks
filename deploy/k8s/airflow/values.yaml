# Helm values for `apache-airflow/airflow` chart (≥1.15).
# Install with:
#   helm repo add apache-airflow https://airflow.apache.org
#   helm upgrade --install airflow apache-airflow/airflow \
#     -n airflow --create-namespace \
#     -f deploy/k8s/airflow/values.yaml

executor: KubernetesExecutor

# DAGs are not baked into the image and not synced from git — a sidecar
# rsyncs them from a GCS bucket every 30s. The upload API writes there.
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

config:
  core:
    dag_dir_list_interval: "30"
    load_examples: "False"
  scheduler:
    min_file_process_interval: "30"
  kubernetes:
    pod_template_file: /opt/airflow/pod_templates/pod_template_file.yaml

# Workload Identity so the gcs-sync sidecar can read the bucket without
# baked-in credentials. Bind this SA to a GCP SA via
#   gcloud iam service-accounts add-iam-policy-binding ...
serviceAccount:
  create: true
  name: airflow
  annotations:
    iam.gke.io/gcp-service-account: airflow-dags-reader@inner-autonomy-371516.iam.gserviceaccount.com

webserver:
  service:
    type: ClusterIP
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: daniel@straloo.com.br
    firstName: Daniel
    lastName: Admin
    password: admin

postgresql:
  enabled: true

redis:
  enabled: false

# Pod spec overrides to add GCS sync sidecar and shared volume
podAnnotations:
  gcs-sync-enabled: "true"

# Add sidecar and volume to scheduler using podSpecPatch (or similar mechanism)
# Unfortunately, the Helm chart doesn't have a clean way to add sidecars,
# so we'll use a post-install hook or apply the sidecar separately
