apiVersion: apps/v1
kind: Deployment
metadata:
  name: poorbricks-server
  namespace: airflow
  labels:
    app: poorbricks-server
  annotations:
    # Restart this Deployment when any Secret it mounts (e.g. the VSO-managed
    # poorbricks-server-mongodb-creds / poorbricks-server-postgresql-creds)
    # is rotated by Vault. Without this the pod keeps a revoked credential
    # in its env and crashes on the next DB connection attempt.
    reloader.stakater.com/auto: "true"
spec:
  # HA: 2 replicas behind the poorbricks-server Service. Worker pods fetch their
  # code tarball from this API (/v1/code) on every task, and it serves the
  # observability API — a single replica is a SPOF. Both replicas mount the RWX
  # DAG volume read/write; /v1/upload writes are per-prefix and infrequent, so
  # concurrent writes from two replicas don't realistically collide.
  replicas: 2
  selector:
    matchLabels:
      app: poorbricks-server
  template:
    metadata:
      labels:
        app: poorbricks-server
    spec:
      serviceAccountName: poorbricks-server
      # De-pinned from the single poorbricks.io/dags node: the DAG dir is now
      # RWX (airflow-dags-rwx) so this can spread across the on-demand pool. The
      # spot taint keeps it off preemptible nodes without an explicit selector.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: poorbricks-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          # {{IMAGE_TAG}} is replaced with the commit SHA by the orb's
          # deploy-k8s job (replace-vars). build-docker pushes this image.
          image: gcr.io/inner-autonomy-371516/poorbricks/api:{{IMAGE_TAG}}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POORBRICKS_API_DAG_STORE
              value: local
            - name: POORBRICKS_API_DAGS_DIR
              value: /opt/airflow/dags
            - name: POORBRICKS_API_WORKER_IMAGE
              value: gcr.io/inner-autonomy-371516/poorbricks/api:{{IMAGE_TAG}}
            - name: POORBRICKS_API_WORKER_NAMESPACE
              value: airflow
            - name: POORBRICKS_API_CODE_PVC_CLAIM
              value: airflow-dags
            - name: POORBRICKS_API_CODE_PVC_ROOT
              value: __code__
            # Atlas connection string (dynamic read-only credentials) synced
            # from Vault by the Vault Secrets Operator. Worker pods inherit
            # this to read bronze sources + the poorbricks contracts DB.
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-mongodb-creds
                  key: MONGO_URI
            - name: CONTRACTS_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-mongodb-creds
                  key: MONGO_URI
            - name: CONTRACTS_DB
              value: poorbricks
            - name: CONTRACTS_COLLECTION
              value: data_contracts
            # Analytics writes (run_history, table inspection) go through the
            # PgBouncer transaction pooler, not -rw directly — see
            # poorbricks/constants.py:DEFAULT_POSTGRES_HOST.
            - name: POSTGRES_HOST
              value: postgresql-pooler-rw.storage.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: poorbricks
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-postgresql-creds
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-postgresql-creds
                  key: password
          envFrom:
            - secretRef:
                name: poorbricks-runtime
                optional: true
            - secretRef:
                name: poorbricks-server-postgresql-creds
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags-rwx
