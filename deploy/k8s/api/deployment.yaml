apiVersion: apps/v1
kind: Deployment
metadata:
  name: poorbricks-server
  namespace: airflow
  labels:
    app: poorbricks-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poorbricks-server
  template:
    metadata:
      labels:
        app: poorbricks-server
    spec:
      serviceAccountName: poorbricks-server
      nodeSelector:
        poorbricks.io/dags: "true"
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/inner-autonomy-371516/poorbricks/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POORBRICKS_API_DAG_STORE
              value: local
            - name: POORBRICKS_API_DAGS_DIR
              value: /opt/airflow/dags
            - name: POORBRICKS_API_WORKER_IMAGE
              value: us-central1-docker.pkg.dev/inner-autonomy-371516/poorbricks/api:latest
            - name: POORBRICKS_API_WORKER_NAMESPACE
              value: airflow
            - name: POORBRICKS_API_CODE_PVC_CLAIM
              value: airflow-dags
            - name: POORBRICKS_API_CODE_PVC_ROOT
              value: __code__
            # Atlas connection string (dynamic read-only credentials) synced
            # from Vault by the Vault Secrets Operator. Worker pods inherit
            # this to read bronze sources + the poorbricks contracts DB.
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-mongodb-creds
                  key: MONGO_URI
            - name: CONTRACTS_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-mongodb-creds
                  key: MONGO_URI
            - name: CONTRACTS_DB
              value: poorbricks
            - name: CONTRACTS_COLLECTION
              value: data_contracts
            - name: POSTGRES_HOST
              value: postgresql-rw.storage.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: poorbricks
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-postgresql-creds
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poorbricks-server-postgresql-creds
                  key: password
          envFrom:
            - secretRef:
                name: poorbricks-runtime
                optional: true
            - secretRef:
                name: poorbricks-server-postgresql-creds
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
