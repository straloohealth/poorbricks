# The local airflow-postgresql PVC, Deployment, and Service that previously
# lived here have been removed. Airflow's metadata database now runs on the
# shared CNPG cluster at postgresql-rw.storage.svc.cluster.local:5432
# (namespace: storage). The airflow-postgresql Secret is managed by VSO.
#
# To clean up the old resources from an existing cluster:
#   kubectl delete deployment airflow-postgresql -n airflow --ignore-not-found
#   kubectl delete service airflow-postgresql -n airflow --ignore-not-found
#   kubectl delete pvc airflow-postgresql -n airflow --ignore-not-found
