apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-triggerer
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: triggerer
spec:
  serviceName: airflow-triggerer
  # HA: 2 triggerers. The triggerer is natively highly-available — deferred
  # tasks (sensors/triggers) are shared across triggerers via the metadata DB,
  # so if one dies the other picks up its triggers. It does not mount the DAG
  # volume, so it was only pinned to the dags node incidentally.
  replicas: 2
  selector:
    matchLabels:
      component: triggerer
  template:
    metadata:
      labels:
        component: triggerer
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      # De-pinned from poorbricks.io/dags (the spot taint keeps it on on-demand
      # nodes); spread the two triggerers across nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    component: triggerer
                topologyKey: kubernetes.io/hostname
      containers:
      - name: triggerer
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "triggerer"]
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080/execution/
        - name: AIRFLOW__CORE__INTERNAL_API_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__API__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: secret-key
        ports:
        - containerPort: 8794
          name: triggerer
        volumeMounts:
        - name: logs
          mountPath: /tmp/airflow-logs
        resources:
          requests:
            cpu: 300m
            memory: 768Mi
          limits:
            cpu: 300m
            memory: 768Mi
      volumes:
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-triggerer
  namespace: airflow
spec:
  clusterIP: None
  selector:
    component: triggerer
  ports:
  - port: 8794
    targetPort: 8794
