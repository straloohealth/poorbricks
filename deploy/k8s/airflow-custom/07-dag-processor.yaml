apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: dag-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      component: dag-processor
  template:
    metadata:
      labels:
        component: dag-processor
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      # De-pinned from poorbricks.io/dags now that the DAG dir is RWX. Kept at 1
      # replica (a node loss reschedules it onto another on-demand node; the
      # parsing gap is brief). The anti-affinity below only bites if scaled >1.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    component: dag-processor
                topologyKey: kubernetes.io/hostname
      containers:
      - name: dag-processor
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "dag-processor"]
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080/execution/
        - name: AIRFLOW__CORE__INTERNAL_API_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__API__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: secret-key
        - name: AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT
          value: "180"
        - name: AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT
          value: "180"
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /tmp/airflow-logs
        # No probe before. Check the DagProcessorJob heartbeat, falling back to a
        # bare process check on Airflow versions where that job-type isn't
        # reported, so a crashed/wedged parser is detected without false restarts.
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - airflow jobs check --job-type DagProcessorJob --hostname $(hostname) || pgrep -f 'airflow dag-processor'
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 6
        # limit > request so parsing bursts (DAG reparse) don't CFS-throttle it.
        resources:
          requests:
            cpu: 300m
            memory: 1Gi
          limits:
            cpu: 1200m
            memory: 1Gi
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-rwx
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
