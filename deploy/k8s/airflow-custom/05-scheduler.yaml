apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-scheduler
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: scheduler
spec:
  serviceName: airflow-scheduler
  # HA: 2 schedulers. Airflow's active-active scheduler HA coordinates via
  # metadata-DB row locks (SELECT ... FOR UPDATE SKIP LOCKED), supported on our
  # Postgres 16 and compatible with LocalExecutor. A task is only ever queued by
  # one scheduler; if a scheduler/node dies the other keeps scheduling.
  replicas: 2
  selector:
    matchLabels:
      component: scheduler
  template:
    metadata:
      labels:
        component: scheduler
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      # De-pinned from the single poorbricks.io/dags node (that pinning existed
      # only because the old RWO DAG PVC attached to one node). The DAG dir is
      # now RWX (airflow-dags-rwx), so schedulers can spread across the on-demand
      # pool. The spot pool is tainted and these pods carry no spot toleration,
      # so they stay on on-demand nodes without an explicit selector.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    component: scheduler
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 50000
      containers:
      - name: scheduler
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080/execution/
        - name: AIRFLOW__CORE__INTERNAL_API_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__API__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: secret-key
        - name: AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT
          value: "180"
        - name: AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT
          value: "180"
        # Worker pods now spread across the Spot node pool rather than being
        # pinned to one shared DAG node, and use request<limit so ~7 worker
        # pods fit per Spot node. Bounded at 15 to use that headroom without
        # overrunning the Spot autoscaler.
        - name: AIRFLOW__CORE__PARALLELISM
          value: "15"
        - name: AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG
          value: "15"
        ports:
        - containerPort: 8793
          name: scheduler
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /tmp/airflow-logs
        # No probe before: a wedged scheduler (DB error / deadlock) sat dead
        # until manually noticed, contributing to the silent restart-churn.
        # `airflow jobs check` confirms this scheduler heartbeated recently;
        # generous timing so a transient DB slowdown can't restart it.
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - airflow jobs check --job-type SchedulerJob --hostname $(hostname) --limit 30
          initialDelaySeconds: 90
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 3Gi
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-rwx
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  clusterIP: None
  selector:
    component: scheduler
  ports:
  - port: 8793
    targetPort: 8793
