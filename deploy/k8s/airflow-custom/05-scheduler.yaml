apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-scheduler
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: scheduler
spec:
  serviceName: airflow-scheduler
  replicas: 1
  selector:
    matchLabels:
      component: scheduler
  template:
    metadata:
      labels:
        component: scheduler
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      nodeSelector:
        poorbricks.io/dags: "true"
      securityContext:
        fsGroup: 50000
      containers:
      - name: scheduler
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080/execution/
        - name: AIRFLOW__CORE__INTERNAL_API_URL
          value: http://airflow-webserver.airflow.svc.cluster.local:8080
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT
          value: "180"
        - name: AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT
          value: "180"
        - name: AIRFLOW__CORE__PARALLELISM
          value: "4"
        - name: AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG
          value: "4"
        ports:
        - containerPort: 8793
          name: scheduler
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /tmp/airflow-logs
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 3Gi
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  clusterIP: None
  selector:
    component: scheduler
  ports:
  - port: 8793
    targetPort: 8793
