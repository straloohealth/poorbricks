# airflow-postgresql Secret is intentionally absent here.
# It is provisioned dynamically by VaultStaticSecret (VSO) in the storage namespace
# and synced into the airflow namespace. Do not add a static version — VSO will
# overwrite it on every sync cycle.

apiVersion: v1
kind: Secret
metadata:
  name: airflow-fernet-key
  namespace: airflow
type: Opaque
stringData:
  fernet-key: "GVRU8dlXJNlcEtuFu5IqBShQRxTxtHfgJ_s2ZFo8QcM="
  jwt-secret: "Khc1qVnB5xQ9Y3wT2bJ4mP6sLk7DvR8FuG0aHj_zNcE="
  # [api] secret_key — MUST be identical across api-server, scheduler,
  # triggerer, and dag-processor. When unset, Airflow 3 generates a
  # random value per pod and the /api/v2/.../logs/{n} endpoint returns
  # only the "Please make sure that all your Airflow components ...
  # have the same 'secret_key' configured" advisory instead of the
  # real worker log.
  secret-key: "lle1zHDgVHqpvQcEx9COLNVIADD09nrwOMUS5Ulu9UgPPtfAq1eYifEUz69fTKra"
