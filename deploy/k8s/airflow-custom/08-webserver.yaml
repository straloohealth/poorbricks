apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: webserver
spec:
  # HA: 2 api-server replicas behind the ClusterIP Service. This is stateless,
  # and worker pods call its /execution/ API to run/heartbeat tasks — a single
  # replica is a pipeline-wide SPOF, so run two.
  replicas: 2
  selector:
    matchLabels:
      component: webserver
  template:
    metadata:
      labels:
        component: webserver
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      # De-pinned from poorbricks.io/dags now that the DAG dir is RWX; the spot
      # taint keeps it on on-demand nodes. Spread the two replicas across nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    component: webserver
                topologyKey: kubernetes.io/hostname
      containers:
      - name: webserver
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "api-server"]
        ports:
        - containerPort: 8080
          name: webserver
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__API__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: secret-key
        - name: AIRFLOW__CORE__AUTH_MANAGER
          value: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
        - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS
          value: "True"
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /tmp/airflow-logs
        # /api/v2/monitor/health queries the metadata DB. The old probes (1s
        # default timeout, 3 failures, 10s/5s periods) + a hard CPU limit=request
        # evicted the pod whenever a health query was slow under DB load — the
        # cause of the 35 webserver restarts. Loosen the timeouts/thresholds so a
        # transient DB slowdown sheds the pod from the Service (readiness) instead
        # of killing it, and only a sustained ~3min outage trips liveness.
        startupProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # limit > request so a health-query spike can burst CPU instead of
        # CFS-throttling exactly when the pod must answer the probe.
        resources:
          requests:
            cpu: 300m
            memory: 768Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-rwx
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    component: webserver
