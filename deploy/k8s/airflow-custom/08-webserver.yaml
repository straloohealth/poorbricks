apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    component: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      component: webserver
  template:
    metadata:
      labels:
        component: webserver
    spec:
      serviceAccountName: airflow
      restartPolicy: Always
      nodeSelector:
        poorbricks.io/dags: "true"
      containers:
      - name: webserver
        image: apache/airflow:3.2.0
        imagePullPolicy: IfNotPresent
        command: ["airflow", "api-server"]
        ports:
        - containerPort: 8080
          name: webserver
        env:
        - name: AIRFLOW_HOME
          value: /opt/airflow
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: /opt/airflow/dags
        - name: AIRFLOW__CORE__BASE_LOG_FOLDER
          value: /tmp/airflow-logs
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-postgresql
              key: connection
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: fernet-key
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: airflow-fernet-key
              key: jwt-secret
        - name: AIRFLOW__CORE__AUTH_MANAGER
          value: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
        - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS
          value: "True"
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /tmp/airflow-logs
        startupProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v2/monitor/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
        resources:
          requests:
            cpu: 300m
            memory: 768Mi
          limits:
            cpu: 300m
            memory: 768Mi
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags
      - name: logs
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    component: webserver
