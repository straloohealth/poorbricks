apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
data:
  airflow.cfg: |
    [core]
    dags_folder = /opt/airflow/dags
    base_log_folder = /tmp/airflow-logs
    executor = LocalExecutor
    fernet_key = jO0L0C5rEw0yJ_0zyBQ3_c-2x3E_c5yO5zN8xK2yP0A=
    load_examples = False
    # Workers now spread across the Spot node pool instead of one shared DAG
    # node, so a single DAG can run far more tasks at once. Bounded at 10 —
    # raise only alongside more nodes / capacity measurement.
    max_active_tasks_per_dag = 10

    [scheduler]
    catchup_by_default = False
    dag_dir_list_interval = 30

    [api]
    auth_backends = airflow.api.auth.backend.default

    [webserver]
    expose_config = True
    rbac = True

    [core]
    auth_manager = airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    simple_auth_manager_all_admins = False
    simple_auth_manager_users = admin:admin
