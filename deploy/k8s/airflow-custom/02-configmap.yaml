apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
data:
  airflow.cfg: |
    [core]
    dags_folder = /opt/airflow/dags
    base_log_folder = /tmp/airflow-logs
    executor = LocalExecutor
    sql_alchemy_conn = postgresql://airflow:airflow@airflow-postgresql:5432/airflow
    fernet_key = jO0L0C5rEw0yJ_0zyBQ3_c-2x3E_c5yO5zN8xK2yP0A=
    load_examples = False
    max_active_tasks_per_dag = 16

    [scheduler]
    catchup_by_default = False
    dag_dir_list_interval = 30

    [api]
    auth_backends = airflow.api.auth.backend.default

    [webserver]
    expose_config = True
    rbac = True
