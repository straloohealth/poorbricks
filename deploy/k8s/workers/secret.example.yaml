# Template for the runtime secret consumed by worker pods via env_from.
# Real values should be created manually (or via External Secrets) — never
# committed to git. Apply with:
#   kubectl create secret generic poorbricks-runtime -n poorbricks-workers \
#     --from-literal=MONGO_URI=... \
#     --from-literal=POSTGRES_HOST=... \
#     --from-literal=POSTGRES_PORT=5432 \
#     --from-literal=POSTGRES_DB=analytics \
#     --from-literal=POSTGRES_USER=analytics \
#     --from-literal=POSTGRES_PASSWORD=...
apiVersion: v1
kind: Secret
metadata:
  name: poorbricks-runtime
  namespace: poorbricks-workers
type: Opaque
stringData:
  MONGO_URI: "mongodb://REPLACE_ME"
  POSTGRES_HOST: "REPLACE_ME"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "analytics"
  POSTGRES_USER: "analytics"
  POSTGRES_PASSWORD: "REPLACE_ME"
