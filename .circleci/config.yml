version: 2.1

# The Straloo tools orb provides install-python-deps, wait-for-ports-ready,
# build-docker, deploy-k8s and publish-python-package.
orbs:
  tools: straloohealth/tools@3

# ── Executors ───────────────────────────────────────────────────────────────
# The orb's python-test executor uses cimg/python and has no MongoDB +
# PostgreSQL sidecar combo, so the Spark-capable image stacks stay here.
single_image: &single_image
  - image: docker.io/danielspeixoto/databricks

docker_images: &docker_images
  - image: docker.io/danielspeixoto/databricks
  - image: mongo:7
  - image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics

# Restore/install/save the dependency cache via the orb. private-registry is
# off: poorbricks-framework has only public-PyPI deps and these jobs run
# without the gke context.
install_deps: &install_deps
  tools/install-python-deps:
    private-registry: false
    cache-path: /root/.cache/pypoetry

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  lint-and-type-check:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *install_deps
      - run:
          name: Ruff lint
          command: poetry run ruff check .
      - run:
          name: Ruff format check
          command: poetry run ruff format --check .
      - run:
          name: MyPy
          command: poetry run mypy poorbricks/ utils/ validation/

  tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *install_deps
      - tools/wait-for-ports-ready:
          ports: "27017"
      - run:
          name: Unit tests (poorbricks + utils + tables + validation + api)
          command: >
            poetry run pytest poorbricks/ utils/ tables/ validation/ api/
            -n 2 -m "not integration and not slow"
      - run:
          name: Architecture validation
          command: poetry run poorbricks verify --mode arch
      - store_test_results:
          path: test-results

  multi-repo-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *install_deps
      - run:
          name: Multi-repo contract verification scenarios
          # Resets addopts to drop xdist (-n 4); --junitxml must be repeated
          # here because the reset also clears the default from pyproject.toml.
          command: >
            poetry run pytest tests/test_multi_repo.py
            -o "addopts="
            --junitxml=test-results/junit.xml
            --tb=short -v
      - store_test_results:
          path: test-results

  build-and-smoke:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *install_deps
      - tools/wait-for-ports-ready:
          ports: "27017"
      - run:
          name: Wheel-install boundary smoke test
          command: >
            poetry run pytest tests/test_wheel_install_boundary.py
            -m slow -n 0
          no_output_timeout: 10m
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: dist
          destination: wheel

  integration-tests:
    docker: *docker_images
    resource_class: large
    steps:
      - checkout
      - *install_deps
      - tools/wait-for-ports-ready:
          ports: "27017 5432"
      - run:
          name: Distributed pipeline integration test (bronze → silver → gold)
          command: >
            poetry run pytest tests/test_distributed_pipeline.py
            -m integration -n 0
          no_output_timeout: 30m
      - store_test_results:
          path: test-results

  workflow-compilation-tests:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *install_deps
      - run:
          name: Workflow parsing and DAG generation tests
          command: poetry run pytest tests/test_infrastructure_e2e.py
      - store_test_results:
          path: test-results

# ── Workflows ───────────────────────────────────────────────────────────────
workflows:
  test:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - tests
      - multi-repo-tests
      - build-and-smoke
      - workflow-compilation-tests
      - integration-tests

  deploy:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      # ── Tests: all run in parallel ──
      - lint-and-type-check
      - tests
      - multi-repo-tests
      - build-and-smoke
      - workflow-compilation-tests
      - integration-tests
      # ── Publish + deploy: gated behind every test job ──
      - tools/publish-python-package:
          context: [gke]
          requires:
            - lint-and-type-check
            - tests
            - multi-repo-tests
            - build-and-smoke
            - workflow-compilation-tests
            - integration-tests
      - tools/build-docker:
          context: [gke]
          image: poorbricks/api
          dockerfile: api/Dockerfile
          requires:
            - lint-and-type-check
            - tests
            - multi-repo-tests
            - build-and-smoke
            - workflow-compilation-tests
            - integration-tests
      - tools/deploy-k8s:
          name: deploy-api
          context: [gke]
          kubernetes-directory: deploy/k8s/api
          requires: [tools/build-docker]
      - tools/deploy-k8s:
          name: deploy-streamlit
          context: [gke]
          kubernetes-directory: deploy/k8s/streamlit
          requires: [tools/build-docker]
