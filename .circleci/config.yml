version: 2.1

# ── Anchors ────────────────────────────────────────────────────────────────
_defaults:
  docker: &image
    - image: docker.io/danielspeixoto/databricks
  restore: &restore_cache
    restore_cache:
      keys:
        - v2-deps-{{ checksum "poetry.lock" }}
        - v2-deps-
  install: &install
    run:
      name: Install dependencies
      command: pip install --quiet poetry && poetry install --no-interaction
  save: &save_cache
    save_cache:
      key: v2-deps-{{ checksum "poetry.lock" }}
      paths:
        - /root/.cache/pypoetry/virtualenvs
  setup: &setup
    steps:
      - checkout
      - *restore_cache
      - *install
      - *save_cache
  docker_images:
    - image: docker.io/danielspeixoto/databricks
    - image: mongo:7
    - image: postgres:16
      environment:
        POSTGRES_DB: analytics
        POSTGRES_USER: analytics
        POSTGRES_PASSWORD: analytics

# ── Jobs ───────────────────────────────────────────────────────────────────
jobs:

  lint-and-type-check:
    docker: *image
    resource_class: medium
    steps:
      - *setup
      - run:
          name: Ruff lint
          command: poetry run ruff check .
      - run:
          name: Ruff format check
          command: poetry run ruff format --check .
      - run:
          name: MyPy
          command: poetry run mypy poorbricks/ utils/ validation/ tests/

  unit-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - *setup
      - run:
          name: Wait for MongoDB
          command: until mongosh --quiet --eval 'db.adminCommand("ping")' >/dev/null 2>&1; do sleep 2; done && echo "MongoDB ready"
  
      - run:
          name: Unit tests (all levels, fixtures mode)
          command: >
            poetry run pytest tables/
            -n 2 --dist loadgroup
            -m "not integration"
            --junitxml=test-results-unit.xml
            --tb=short -v
      - store_test_results:
          path: test-results-unit.xml

  multi-repo-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - *setup
      - run:
          name: Multi-repo contract verification scenarios
          command: >
            poetry run pytest tests/test_multi_repo.py
            -o "addopts="
            --junitxml=test-results-multi-repo.xml
            --tb=short -v
      - store_test_results:
          path: test-results-multi-repo.xml

  build-and-smoke:
    docker: *docker_images
    resource_class: medium
    steps:
      - *setup
      - run:
          name: Wait for MongoDB
          command: until mongosh --quiet --eval 'db.adminCommand("ping")' >/dev/null 2>&1; do sleep 2; done && echo "MongoDB ready"
      - run:
          name: Build wheel
          command: poetry build -f wheel
      - run:
          name: Simulate isolated table-repo install
          command: poetry run python scripts/simulate_table_repo.py
          no_output_timeout: 10m
      - store_artifacts:
          path: dist
          destination: wheel

  integration-tests:
    docker: *docker_images
    resource_class: large
    steps:
      - *setup
      - run:
          name: Wait for services
          command: |
            until mongosh --quiet --eval 'db.adminCommand("ping")' >/dev/null 2>&1
            do sleep 2; done && echo "MongoDB ready"
            until pg_isready -h localhost -U analytics -d analytics >/dev/null 2>&1
            do sleep 2; done && echo "PostgreSQL ready"
      - run:
          name: Distributed pipeline test (bronze → silver → gold)
          command: poetry run python scripts/test_distributed_pipeline.py
          no_output_timeout: 30m

# ── Workflows ──────────────────────────────────────────────────────────────
workflows:
  test:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests
      - multi-repo-tests
      - build-and-smoke
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]

  deploy:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests:
          requires: [lint-and-type-check]
      - multi-repo-tests:
          requires: [lint-and-type-check]
      - build-and-smoke:
          requires: [lint-and-type-check]
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]
