version: 2.1

# ── Anchors ────────────────────────────────────────────────────────────────
restore_cache: &restore_cache
  restore_cache:
    keys:
      - v3-deps-{{ checksum "poetry.lock" }}
      - v3-deps-

install_deps: &install_deps
  run:
    name: Install dependencies
    environment:
      PIP_DEFAULT_TIMEOUT: "180"
      PIP_RETRIES: "5"
    command: |
      pip install --quiet poetry
      for attempt in 1 2 3; do
        if poetry install --no-interaction; then
          break
        fi
        echo "poetry install attempt $attempt failed; retrying in 15s..."
        sleep 15
      done

save_cache: &save_cache
  save_cache:
    key: v3-deps-{{ checksum "poetry.lock" }}
    paths:
      - /root/.cache/pypoetry/virtualenvs

setup_steps: &setup_steps
  - checkout
  - *restore_cache
  - *install_deps
  - *save_cache

single_image: &single_image
  - image: docker.io/danielspeixoto/databricks

docker_images: &docker_images
  - image: docker.io/danielspeixoto/databricks
  - image: mongo:7
  - image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics

# ── Jobs ───────────────────────────────────────────────────────────────────
jobs:

  lint-and-type-check:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Ruff lint
          command: poetry run ruff check .
      - run:
          name: Ruff format check
          command: poetry run ruff format --check .
      - run:
          name: MyPy
          command: poetry run mypy poorbricks/ utils/ validation/

  unit-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB
          command: for i in {1..30}; do timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break; sleep 1; done

      - run:
          name: Unit tests (poorbricks + utils + tables + validation)
          command: >
            poetry run pytest poorbricks/ utils/ tables/ validation/
            -n 2 --dist loadgroup
            -m "not integration and not slow"
            --junitxml=test-results-unit.xml
            --tb=short -v
      - run:
          name: Architecture validation
          command: poetry run poorbricks verify --mode arch
      - store_test_results:
          path: test-results-unit.xml

  multi-repo-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Multi-repo contract verification scenarios
          command: >
            poetry run pytest tests/test_multi_repo.py
            -o "addopts="
            --junitxml=test-results-multi-repo.xml
            --tb=short -v
      - store_test_results:
          path: test-results-multi-repo.xml

  build-and-smoke:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB
          command: for i in {1..30}; do timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break; sleep 1; done
      - run:
          name: Wheel-install boundary smoke test
          command: >
            poetry run pytest tests/test_wheel_install_boundary.py
            -m slow -n 0 -v --tb=short
            --junitxml=test-results-smoke.xml
          no_output_timeout: 10m
      - store_test_results:
          path: test-results-smoke.xml
      - store_artifacts:
          path: dist
          destination: wheel

  integration-tests:
    docker: *docker_images
    resource_class: large
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB and PostgreSQL
          command: |
            echo "Waiting for MongoDB on port 27017..."
            for i in {1..30}; do
              timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break
              sleep 1
            done
            echo "Waiting for PostgreSQL on port 5432..."
            for i in {1..30}; do
              timeout 1 bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null && echo "PostgreSQL ready" && break
              sleep 1
            done
      - run:
          name: Distributed pipeline integration test (bronze → silver → gold)
          command: >
            poetry run pytest tests/test_distributed_pipeline.py
            -m integration -n 0 -v --tb=short
            --junitxml=test-results-integration.xml
          no_output_timeout: 30m
      - store_test_results:
          path: test-results-integration.xml

  workflow-compilation-tests:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Workflow parsing and DAG generation tests
          command: >
            poetry run pytest tests/test_infrastructure_e2e.py
            -v --tb=short
            --junitxml=test-results-workflow.xml
      - store_test_results:
          path: test-results-workflow.xml

  image-release:
    docker:
      - image: google/cloud-sdk:slim
    resource_class: small
    steps:
      - checkout
      - run:
          name: Dump GCP-related env var names
          command: |
            echo "Env vars matching google/gcp/service/key/cred (names only):"
            env | awk -F= '{print $1}' \
              | grep -iE 'google|gcp|service|key|cred|cluster|region' || echo "  (none matched)"
      - run:
          name: Authenticate to GCP
          command: |
            set -e
            if [ -z "${GOOGLE_SERVICE_ACCOUNT:-}" ]; then
              echo "GOOGLE_SERVICE_ACCOUNT env var is empty (context 'gke' not attached?)" >&2
              exit 1
            fi
            # The secret is base64-encoded in the gke context (matches the
            # convention used by other straloo repos that consume it via
            # tools/inject-file). Fall back to raw if decode fails.
            if printf '%s' "$GOOGLE_SERVICE_ACCOUNT" | base64 -d > /tmp/gcp-sa.json 2>/dev/null \
                && python3 -c "import json; json.load(open('/tmp/gcp-sa.json'))" 2>/dev/null; then
              echo "Decoded base64 service account key."
            else
              printf '%s' "$GOOGLE_SERVICE_ACCOUNT" > /tmp/gcp-sa.json
              python3 -c "import json; json.load(open('/tmp/gcp-sa.json'))"
              echo "Using raw service account key."
            fi
            gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
            gcloud config set project inner-autonomy-371516
      - run:
          name: Submit Cloud Build (api image)
          command: |
            gcloud builds submit \
              --config=cloudbuild.yaml \
              --substitutions=SHORT_SHA="${CIRCLE_SHA1:0:7}" \
              .
          no_output_timeout: 30m

# ── Workflows ──────────────────────────────────────────────────────────────
workflows:
  test:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests
      - multi-repo-tests
      - build-and-smoke
      - workflow-compilation-tests
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]

  deploy:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests:
          requires: [lint-and-type-check]
      - multi-repo-tests:
          requires: [lint-and-type-check]
      - build-and-smoke:
          requires: [lint-and-type-check]
      - workflow-compilation-tests:
          requires: [lint-and-type-check]
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]

  image-release:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - image-release:
          context:
            - gke
