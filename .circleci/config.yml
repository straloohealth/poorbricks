version: 2.1

# ── Anchors ────────────────────────────────────────────────────────────────
restore_cache: &restore_cache
  restore_cache:
    keys:
      - v3-deps-{{ checksum "poetry.lock" }}
      - v3-deps-

install_deps: &install_deps
  run:
    name: Install dependencies
    command: pip install --quiet poetry && poetry install --no-interaction

save_cache: &save_cache
  save_cache:
    key: v3-deps-{{ checksum "poetry.lock" }}
    paths:
      - /root/.cache/pypoetry/virtualenvs

setup_steps: &setup_steps
  - checkout
  - *restore_cache
  - *install_deps
  - *save_cache

single_image: &single_image
  - image: docker.io/danielspeixoto/databricks

docker_images: &docker_images
  - image: docker.io/danielspeixoto/databricks
  - image: mongo:7
  - image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics

# ── Jobs ───────────────────────────────────────────────────────────────────
jobs:

  lint-and-type-check:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Ruff lint
          command: poetry run ruff check .
      - run:
          name: Ruff format check
          command: poetry run ruff format --check .
      - run:
          name: MyPy
          command: poetry run mypy poorbricks/ utils/ validation/

  unit-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB
          command: for i in {1..30}; do timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break; sleep 1; done

      - run:
          name: Unit tests (poorbricks + utils + tables + validation)
          command: >
            poetry run pytest poorbricks/ utils/ tables/ validation/
            -n 2 --dist loadgroup
            -m "not integration and not slow"
            --junitxml=test-results-unit.xml
            --tb=short -v
      - run:
          name: Architecture validation
          command: poetry run poorbricks verify --mode arch
      - store_test_results:
          path: test-results-unit.xml

  multi-repo-tests:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Multi-repo contract verification scenarios
          command: >
            poetry run pytest tests/test_multi_repo.py
            -o "addopts="
            --junitxml=test-results-multi-repo.xml
            --tb=short -v
      - store_test_results:
          path: test-results-multi-repo.xml

  build-and-smoke:
    docker: *docker_images
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB
          command: for i in {1..30}; do timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break; sleep 1; done
      - run:
          name: Wheel-install boundary smoke test
          command: >
            poetry run pytest tests/test_wheel_install_boundary.py
            -m slow -n 0 -v --tb=short
            --junitxml=test-results-smoke.xml
          no_output_timeout: 10m
      - store_test_results:
          path: test-results-smoke.xml
      - store_artifacts:
          path: dist
          destination: wheel

  integration-tests:
    docker: *docker_images
    resource_class: large
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Wait for MongoDB and PostgreSQL
          command: |
            echo "Waiting for MongoDB on port 27017..."
            for i in {1..30}; do
              timeout 1 bash -c 'echo > /dev/tcp/localhost/27017' 2>/dev/null && echo "MongoDB ready" && break
              sleep 1
            done
            echo "Waiting for PostgreSQL on port 5432..."
            for i in {1..30}; do
              timeout 1 bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null && echo "PostgreSQL ready" && break
              sleep 1
            done
      - run:
          name: Distributed pipeline integration test (bronze → silver → gold)
          command: >
            poetry run pytest tests/test_distributed_pipeline.py
            -m integration -n 0 -v --tb=short
            --junitxml=test-results-integration.xml
          no_output_timeout: 30m
      - store_test_results:
          path: test-results-integration.xml

  workflow-compilation-tests:
    docker: *single_image
    resource_class: medium
    steps:
      - checkout
      - *restore_cache
      - *install_deps
      - *save_cache
      - run:
          name: Workflow parsing and DAG generation tests
          command: >
            poetry run pytest tests/test_infrastructure_e2e.py
            -v --tb=short
            --junitxml=test-results-workflow.xml
      - store_test_results:
          path: test-results-workflow.xml

# ── Workflows ──────────────────────────────────────────────────────────────
workflows:
  test:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests
      - multi-repo-tests
      - build-and-smoke
      - workflow-compilation-tests
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]

  deploy:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - lint-and-type-check
      - unit-tests:
          requires: [lint-and-type-check]
      - multi-repo-tests:
          requires: [lint-and-type-check]
      - build-and-smoke:
          requires: [lint-and-type-check]
      - workflow-compilation-tests:
          requires: [lint-and-type-check]
      - integration-tests:
          requires: [unit-tests, multi-repo-tests, build-and-smoke, lint-and-type-check]
