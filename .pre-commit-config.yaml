default_language_version:
  python: python3.12

repos:
  # Ruff - linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # MyPy - static type checking (runs against the project's mypy config)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/python -m mypy .
        language: system
        pass_filenames: false
        always_run: true

  # Trailing whitespace and end-of-file-fixer
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: |
          (?x)^(
            \.circleci/config\.yml|
            deploy/k8s/.*\.yaml
          )$
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: debug-statements

  # Bandit - security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        additional_dependencies:
          - pbr
        args: [-c, .bandit]
        exclude: ^tests/

  # Unit tests — mirrors the CI unit-tests job
  - repo: local
    hooks:
      - id: unit-tests
        name: Unit tests
        entry: .venv/bin/python -m pytest tables/ -n 2 --dist loadgroup -m "not integration" --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
